<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskMemo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06060e;
  --bg2: #0a0a18;
  --surface: rgba(18, 18, 40, 0.7);
  --surface2: rgba(30, 30, 60, 0.6);
  --surface-solid: #12122a;
  --glass: rgba(255,255,255,0.03);
  --glass-border: rgba(255,255,255,0.06);
  --accent1: #7c5cfc;
  --accent2: #00d4ff;
  --accent3: #ff6bca;
  --accent4: #00e599;
  --gradient1: linear-gradient(135deg, #7c5cfc, #00d4ff);
  --gradient2: linear-gradient(135deg, #ff6bca, #7c5cfc);
  --gradient3: linear-gradient(135deg, #00e599, #00d4ff);
  --green: #00e599;
  --yellow: #ffcc00;
  --red: #ff5577;
  --orange: #ff9944;
  --text: #e8e8f0;
  --text2: #7a7a9e;
  --text3: #4a4a6a;
  --border: rgba(255,255,255,0.06);
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --glow: 0 0 40px rgba(124,92,252,0.15);
}

html.light {
  --bg: #f0f0f8;
  --bg2: #e8e8f4;
  --surface: rgba(255,255,255,0.8);
  --surface2: rgba(240,240,255,0.8);
  --surface-solid: #ffffff;
  --glass: rgba(255,255,255,0.5);
  --glass-border: rgba(0,0,0,0.06);
  --text: #1a1a2e;
  --text2: #6b6b88;
  --text3: #9999b0;
  --border: rgba(0,0,0,0.06);
  --shadow: 0 8px 32px rgba(0,0,0,0.08);
  --glow: 0 0 40px rgba(124,92,252,0.1);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.5s;
}

/* ===== Ambient Background ===== */
.ambient {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.ambient-orb {
  position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.12;
  animation: orbFloat 20s ease-in-out infinite;
}
.ambient-orb:nth-child(1) {
  width: 600px; height: 600px; background: var(--accent1);
  top: -200px; left: -100px; animation-delay: 0s;
}
.ambient-orb:nth-child(2) {
  width: 500px; height: 500px; background: var(--accent2);
  top: 50%; right: -150px; animation-delay: -7s;
}
.ambient-orb:nth-child(3) {
  width: 400px; height: 400px; background: var(--accent3);
  bottom: -100px; left: 30%; animation-delay: -14s;
}
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(40px, -30px) scale(1.1); }
  66% { transform: translate(-30px, 20px) scale(0.95); }
}
html.light .ambient-orb { opacity: 0.07; }

/* ===== Particles ===== */
canvas#particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* ===== Header ===== */
header {
  position: sticky; top: 0; z-index: 100;
  background: var(--surface);
  backdrop-filter: blur(24px) saturate(1.5);
  -webkit-backdrop-filter: blur(24px) saturate(1.5);
  border-bottom: 1px solid var(--glass-border);
  padding: 12px 24px;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}

.logo {
  font-size: 22px; font-weight: 900; letter-spacing: -0.5px;
  background: var(--gradient1);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  cursor: pointer; user-select: none;
  transition: transform 0.3s;
}
.logo:hover { transform: scale(1.05); }

.header-left { display: flex; align-items: center; gap: 12px; }
.header-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }

.project-select {
  padding: 7px 12px; background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); color: var(--text); font-size: 12px; font-weight: 500;
  outline: none; cursor: pointer; backdrop-filter: blur(8px); max-width: 140px;
}

.tab-bar {
  display: flex; gap: 3px; background: var(--glass);
  padding: 3px; border-radius: 12px; border: 1px solid var(--glass-border);
}
.tab-btn {
  padding: 8px 20px; border: none; background: transparent;
  color: var(--text2); font-size: 13px; font-weight: 600;
  border-radius: 10px; cursor: pointer; transition: all 0.3s;
  position: relative; overflow: hidden;
}
.tab-btn.active {
  background: var(--gradient1); color: #fff;
  box-shadow: 0 4px 15px rgba(124,92,252,0.3);
}
.tab-btn:hover:not(.active) { color: var(--text); background: var(--surface2); }

.hdr-btn {
  width: 36px; height: 36px; border: 1px solid var(--glass-border);
  background: var(--glass); backdrop-filter: blur(8px);
  color: var(--text2); border-radius: 10px; cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
}
.hdr-btn:hover {
  background: var(--surface2); color: var(--text);
  border-color: var(--accent1); box-shadow: var(--glow);
  transform: translateY(-1px);
}

/* ===== Main ===== */
main {
  position: relative; z-index: 1;
  max-width: 940px; margin: 0 auto; padding: 24px 16px 80px;
}
.view { display: none; }
.view.active { display: block; animation: viewIn 0.4s ease; }
@keyframes viewIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== Buttons ===== */
.btn {
  padding: 10px 22px; background: var(--gradient1); color: #fff; border: none;
  border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.3s; white-space: nowrap;
  box-shadow: 0 4px 15px rgba(124,92,252,0.25);
  position: relative; overflow: hidden;
}
.btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124,92,252,0.35); }
.btn:hover::before { opacity: 1; }
.btn:active { transform: translateY(0); }
.btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 8px; box-shadow: none; }
.btn-ghost {
  background: var(--glass); color: var(--text2); border: 1px solid var(--glass-border);
  box-shadow: none; backdrop-filter: blur(8px);
}
.btn-ghost::before { display: none; }
.btn-ghost:hover { background: var(--surface2); color: var(--text); box-shadow: none; border-color: var(--accent1); }
.btn-danger { background: linear-gradient(135deg, #ff5577, #ff3366); box-shadow: 0 4px 15px rgba(255,85,119,0.25); }

/* ===== Stats ===== */
.stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.stat-card {
  background: var(--surface); backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  padding: 20px 16px; text-align: center;
  transition: all 0.3s; position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--gradient1); opacity: 0; transition: opacity 0.3s;
}
.stat-card:hover { transform: translateY(-3px); box-shadow: var(--glow); border-color: rgba(124,92,252,0.2); }
.stat-card:hover::before { opacity: 1; }
.stat-card:nth-child(2)::before { background: var(--gradient3); }
.stat-card:nth-child(3)::before { background: var(--gradient2); }
.stat-card:nth-child(4)::before { background: linear-gradient(135deg, var(--red), var(--orange)); }
.stat-card:nth-child(2):hover { box-shadow: 0 0 40px rgba(0,229,153,0.1); }
.stat-card:nth-child(4):hover { box-shadow: 0 0 40px rgba(255,85,119,0.1); }

.stat-number {
  font-size: 32px; font-weight: 900; letter-spacing: -1px;
  background: var(--gradient1);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.stat-card:nth-child(2) .stat-number {
  background: var(--gradient3); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.stat-card:nth-child(4) .stat-number {
  background: linear-gradient(135deg, var(--red), var(--orange));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.stat-label { font-size: 11px; color: var(--text2); margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

/* ===== Quick Add ===== */
.quick-add {
  display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
}
.quick-add input[type="text"] {
  flex: 1; min-width: 200px; padding: 14px 18px;
  background: var(--surface); backdrop-filter: blur(16px);
  border: 2px solid var(--glass-border); border-radius: var(--radius);
  color: var(--text); font-size: 14px; font-weight: 500; outline: none;
  transition: all 0.3s;
}
.quick-add input[type="text"]:focus {
  border-color: var(--accent1);
  box-shadow: 0 0 0 4px rgba(124,92,252,0.1), var(--glow);
}
.quick-add input[type="text"]::placeholder { color: var(--text3); }

.quick-add input[type="date"], .priority-select, .sort-select {
  padding: 12px 14px; background: var(--surface); backdrop-filter: blur(16px);
  border: 2px solid var(--glass-border); border-radius: var(--radius);
  color: var(--text); font-size: 13px; outline: none; cursor: pointer;
  transition: all 0.3s;
}
.quick-add input[type="date"]:focus, .priority-select:focus, .sort-select:focus {
  border-color: var(--accent1);
}

/* ===== Filter Bar ===== */
.filter-bar {
  display: flex; gap: 6px; margin-bottom: 18px; flex-wrap: wrap; align-items: center;
}
.filter-chip {
  padding: 6px 14px; border: 1px solid var(--glass-border);
  background: var(--glass); backdrop-filter: blur(8px);
  color: var(--text2); border-radius: 20px; font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.3s;
}
.filter-chip.active {
  background: var(--gradient1); color: #fff; border-color: transparent;
  box-shadow: 0 2px 12px rgba(124,92,252,0.3);
}
.filter-chip:hover:not(.active) { border-color: var(--accent1); color: var(--text); }
.filter-chip.overdue.active {
  background: linear-gradient(135deg, var(--red), var(--orange));
  box-shadow: 0 2px 12px rgba(255,85,119,0.3);
}

.sort-wrap { display: flex; align-items: center; gap: 6px; margin-left: 8px; }
.sort-wrap label { font-size: 11px; color: var(--text3); font-weight: 600; }
.task-count { margin-left: auto; font-size: 11px; color: var(--text3); font-weight: 600; }

/* ===== Task Item ===== */
.task-list { list-style: none; }
.task-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 16px 18px; margin-bottom: 8px;
  background: var(--surface); backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  transition: all 0.3s; animation: taskIn 0.35s ease;
  position: relative; overflow: hidden;
}
.task-item::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(124,92,252,0.03), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.task-item:hover {
  border-color: rgba(124,92,252,0.25);
  box-shadow: var(--glow);
  transform: translateX(4px);
}
.task-item:hover::before { opacity: 1; }
.task-item.done { opacity: 0.45; }
.task-item.done .task-title { text-decoration: line-through; }
.task-item.overdue:not(.done) { border-left: 3px solid var(--red); }
.task-item.overdue:not(.done)::before {
  background: linear-gradient(135deg, rgba(255,85,119,0.04), transparent);
}
.task-item.dragging { opacity: 0.3; transform: scale(0.98); }
.task-item.drag-over { border-color: var(--accent2); border-style: dashed; }

@keyframes taskIn {
  from { opacity: 0; transform: translateX(-16px); }
  to { opacity: 1; transform: translateX(0); }
}

.drag-handle {
  color: var(--text3); cursor: grab; font-size: 12px; opacity: 0;
  user-select: none; margin-top: 3px; flex-shrink: 0; transition: opacity 0.3s;
  letter-spacing: -2px;
}
.task-item:hover .drag-handle { opacity: 0.6; }

.task-check {
  width: 22px; height: 22px; border: 2px solid var(--text3); border-radius: 7px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px; transition: all 0.3s;
  background: transparent; color: transparent; font-size: 12px;
  position: relative;
}
.task-check:hover { border-color: var(--accent1); box-shadow: 0 0 12px rgba(124,92,252,0.2); }
.task-item.done .task-check {
  background: var(--gradient3); border-color: transparent; color: #fff;
  box-shadow: 0 2px 8px rgba(0,229,153,0.3);
}

.task-body { flex: 1; min-width: 0; position: relative; z-index: 1; }
.task-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; word-break: break-word; line-height: 1.4; }

.task-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.priority-badge {
  font-size: 10px; font-weight: 800; padding: 2px 8px;
  border-radius: 5px; text-transform: uppercase; letter-spacing: 0.5px;
}
.priority-high { background: rgba(255,85,119,0.15); color: var(--red); }
.priority-medium { background: rgba(255,204,0,0.15); color: var(--yellow); }
.priority-low { background: rgba(0,229,153,0.15); color: var(--green); }
.task-date { font-size: 11px; color: var(--text3); }
.task-due { font-size: 11px; font-weight: 700; }
.task-due.due-overdue { color: var(--red); }
.task-due.due-today { color: var(--orange); }
.task-due.due-tomorrow { color: var(--yellow); }
.task-due.due-future { color: var(--text2); }

.tag-pill {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 1px 8px; border-radius: 5px; font-size: 10px; font-weight: 700;
  white-space: nowrap; letter-spacing: 0.3px;
  background: rgba(124,92,252,0.12); color: #7c5cfc;
}
.tag-pill .tag-remove { cursor: pointer; font-size: 12px; line-height: 1; opacity: 0.6; }
.tag-pill .tag-remove:hover { opacity: 1; }

.subtask-bar { margin-top: 8px; display: flex; align-items: center; gap: 8px; }
.subtask-progress {
  flex: 1; height: 4px; background: var(--glass-border); border-radius: 2px;
  overflow: hidden; position: relative;
}
.subtask-progress-fill {
  height: 100%; border-radius: 2px; transition: width 0.5s ease;
  background: var(--gradient1);
}
.subtask-count { font-size: 10px; color: var(--text3); font-weight: 600; white-space: nowrap; }

.task-actions {
  display: flex; gap: 2px; opacity: 0; transition: opacity 0.3s; flex-shrink: 0;
  position: relative; z-index: 1;
}
.task-item:hover .task-actions { opacity: 1; }
.icon-btn {
  width: 30px; height: 30px; border: none; background: transparent;
  color: var(--text3); border-radius: 8px; cursor: pointer;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.icon-btn:hover { background: var(--glass); color: var(--text); }
.icon-btn.delete:hover { color: var(--red); }

/* ===== Memo Grid ===== */
.memo-toolbar {
  display: flex; gap: 8px; margin-bottom: 20px; align-items: center; flex-wrap: wrap;
}
.memo-toolbar input {
  flex: 1; min-width: 180px; padding: 12px 16px;
  background: var(--surface); backdrop-filter: blur(16px);
  border: 2px solid var(--glass-border); border-radius: var(--radius);
  color: var(--text); font-size: 13px; outline: none; transition: all 0.3s;
}
.memo-toolbar input:focus { border-color: var(--accent1); box-shadow: 0 0 0 4px rgba(124,92,252,0.1); }
.memo-toolbar input::placeholder { color: var(--text3); }

.tag-input-wrap {
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
  padding: 8px 12px; background: var(--surface); backdrop-filter: blur(16px);
  border: 2px solid var(--glass-border); border-radius: var(--radius);
  min-width: 130px; cursor: text; transition: all 0.3s;
}
.tag-input-wrap:focus-within { border-color: var(--accent1); }
.tag-input-wrap input {
  border: none; background: transparent; color: var(--text);
  font-size: 12px; outline: none; width: 70px; flex: 1;
}
.tag-input-wrap input::placeholder { color: var(--text3); }
.tag-input-wrap { position: relative; }
.tag-suggestions {
  display: flex; gap: 4px; flex-wrap: wrap; width: 100%; margin-top: 4px;
}
.tag-suggest-pill {
  display: inline-flex; align-items: center; padding: 2px 10px;
  background: var(--glass); border: 1px solid var(--glass-border);
  color: var(--text2); border-radius: 6px; font-size: 10px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.tag-suggest-pill:hover { background: rgba(124,92,252,0.15); color: var(--accent1); border-color: var(--accent1); }
.tag-manage-btn {
  display: inline-flex; align-items: center; padding: 2px 8px;
  background: transparent; border: 1px dashed var(--glass-border);
  color: var(--text3); border-radius: 6px; font-size: 10px; cursor: pointer; transition: all 0.2s;
}
.tag-manage-btn:hover { border-color: var(--accent1); color: var(--accent1); }
.custom-tag-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); margin-bottom: 6px;
}
.custom-tag-item .tag-pill { font-size: 12px; padding: 3px 12px; }
.custom-tag-item .icon-btn { width: 26px; height: 26px; font-size: 12px; margin-left: auto; }

.memo-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px;
}
.memo-card {
  background: var(--surface); backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  padding: 18px; cursor: pointer; transition: all 0.4s;
  animation: memoIn 0.4s ease; position: relative; overflow: hidden;
}
.memo-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--gradient1); opacity: 0; transition: opacity 0.3s;
}
.memo-card:hover {
  transform: translateY(-4px);
  border-color: rgba(124,92,252,0.2);
  box-shadow: var(--glow), var(--shadow);
}
.memo-card:hover::before { opacity: 1; }
@keyframes memoIn {
  from { opacity: 0; transform: translateY(12px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.memo-card-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.memo-card-body { font-size: 12px; color: var(--text2); line-height: 1.6; max-height: 68px; overflow: hidden; word-break: break-word; }
.memo-card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
.memo-card-date { font-size: 10px; color: var(--text3); font-weight: 500; }
.memo-card .delete-memo { position: absolute; top: 8px; right: 8px; opacity: 0; transition: all 0.3s; }
.memo-card:hover .delete-memo { opacity: 1; }

.memo-card[data-color="red"]::before { background: linear-gradient(135deg, var(--red), var(--orange)); opacity: 1; }
.memo-card[data-color="yellow"]::before { background: linear-gradient(135deg, var(--yellow), var(--orange)); opacity: 1; }
.memo-card[data-color="green"]::before { background: var(--gradient3); opacity: 1; }
.memo-card[data-color="blue"]::before { background: linear-gradient(135deg, #00d4ff, #0088ff); opacity: 1; }
.memo-card[data-color="purple"]::before { background: var(--gradient2); opacity: 1; }

/* ===== Modals ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  z-index: 200; align-items: center; justify-content: center; padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface-solid); border: 1px solid var(--glass-border);
  border-radius: 20px; width: 100%; max-width: 680px; max-height: 85vh;
  display: flex; flex-direction: column;
  box-shadow: 0 25px 60px rgba(0,0,0,0.5), var(--glow);
  animation: modalIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.92) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header { padding: 22px 24px 0; }
.modal-header input {
  width: 100%; background: transparent; border: none;
  color: var(--text); font-size: 20px; font-weight: 800; outline: none;
  letter-spacing: -0.3px;
}
.modal-header input::placeholder { color: var(--text3); }
.modal-meta-row { display: flex; gap: 8px; padding: 12px 24px 0; flex-wrap: wrap; align-items: center; }

.color-picker { display: flex; gap: 6px; }
.color-dot {
  width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all 0.25s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.color-dot:hover { transform: scale(1.25); }
.color-dot.active { border-color: #fff; transform: scale(1.2); box-shadow: 0 0 12px rgba(124,92,252,0.4); }

.memo-tab-bar { display: flex; gap: 4px; padding: 12px 24px 0; }
.memo-tab-btn {
  padding: 6px 16px; border: 1px solid var(--glass-border); background: transparent;

<script>
// ======================== Particles ========================
(function initParticles() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const count = 60;

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      size: Math.random() * 1.5 + 0.5,
      alpha: Math.random() * 0.3 + 0.05
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const isLight = document.documentElement.classList.contains('light');
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = isLight
        ? `rgba(100, 80, 200, ${p.alpha * 0.5})`
        : `rgba(180, 160, 255, ${p.alpha})`;
      ctx.fill();
    });

    // Draw connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          const alpha = (1 - dist / 120) * 0.06;
          ctx.strokeStyle = isLight
            ? `rgba(100, 80, 200, ${alpha})`
            : `rgba(180, 160, 255, ${alpha})`;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ======================== Confetti ========================
const confettiCanvas = document.getElementById('confetti');
const confettiCtx = confettiCanvas.getContext('2d');
let confettiPieces = [];
let confettiRunning = false;

function resizeConfetti() { confettiCanvas.width = window.innerWidth; confettiCanvas.height = window.innerHeight; }
window.addEventListener('resize', resizeConfetti);
resizeConfetti();

function launchConfetti() {
  confettiPieces = [];
  const colors = ['#7c5cfc', '#00d4ff', '#ff6bca', '#00e599', '#ffcc00', '#ff5577'];
  for (let i = 0; i < 80; i++) {
    confettiPieces.push({
      x: window.innerWidth / 2 + (Math.random() - 0.5) * 200,
      y: window.innerHeight / 2,
      vx: (Math.random() - 0.5) * 16,
      vy: Math.random() * -18 - 5,
      w: Math.random() * 8 + 4,
      h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 12,
      alpha: 1
    });
  }
  if (!confettiRunning) { confettiRunning = true; drawConfetti(); }
}

function drawConfetti() {
  confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  let alive = false;
  confettiPieces.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.4;
    p.rotation += p.rotSpeed;
    p.alpha -= 0.008;
    if (p.alpha <= 0) return;
    alive = true;
    confettiCtx.save();
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate(p.rotation * Math.PI / 180);
    confettiCtx.globalAlpha = p.alpha;
    confettiCtx.fillStyle = p.color;
    confettiCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    confettiCtx.restore();
  });
  if (alive) requestAnimationFrame(drawConfetti);
  else { confettiRunning = false; confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height); }
}

function loadCustomTags() {

// Auto-save: ローカルサーバーに自動保存
let _backupTimer = null;
const _isLocalServer = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

function autoBackup() {
  if (!_isLocalServer) return;
  clearTimeout(_backupTimer);
  _backupTimer = setTimeout(async () => {
    try {
      const allData = { savedAt: new Date().toISOString() };
      // localStorage全体をバックアップ
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith('taskmemo_')) allData[key] = localStorage.getItem(key);
      }
      const res = await fetch('/api/data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(allData)
      });
      if (res.ok) {
        const el = document.getElementById('backup-status');
        if (el) { el.textContent = '✔ 保存済 ' + new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}); el.style.color = 'var(--green)'; }
      }
    } catch (e) { console.warn('auto-save failed:', e); }
  }, 1000);
}

async function loadFromServer() {
  if (!_isLocalServer) return false;
  try {
    const res = await fetch('/api/data');
    if (!res.ok) return false;
    const d = await res.json();
    if (!d.savedAt) return false;
    // サーバーデータをlocalStorageに復元
    for (const [key, val] of Object.entries(d)) {
      if (key.startsWith('taskmemo_')) localStorage.setItem(key, val);
    }
    return true;
  } catch { return false; }
}

// ======================== Undo ========================
let undoStack = [], undoTimer = null;
function pushUndo(msg, fn) { undoStack.push({msg, restore:fn}); showUndoToast(msg); }
function showUndoToast(msg) {
  const t = document.getElementById('undo-toast');
  document.getElementById('undo-message').textContent = msg;
  t.classList.add('show');
  clearTimeout(undoTimer);
  undoTimer = setTimeout(() => { t.classList.remove('show'); undoStack = []; }, 6000);
}
function performUndo() {
  if (!undoStack.length) return;
  undoStack.pop().restore();
  document.getElementById('undo-toast').classList.remove('show');
  clearTimeout(undoTimer); renderTasks(); renderMemos();
}

// ======================== Tasks ========================
let currentFilter = 'all';
function todayStr() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function tomorrowStr() { const d=new Date(); d.setDate(d.getDate()+1); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function addTask() {
  const input = document.getElementById('task-input'), text = input.value.trim(); if(!text)return;
  const tasks = loadTasks();
  tasks.unshift({ id: Date.now(), text, priority: document.getElementById('task-priority').value,
    done: false, due: document.getElementById('task-due').value||null,
    tags:[], subtasks:[], notes:'', linkedMemos:[], created: new Date().toISOString() });
  saveTasks(tasks); input.value=''; document.getElementById('task-due').value=''; input.focus(); renderTasks();
}

function toggleTask(id) {
  const tasks = loadTasks(), t = tasks.find(t=>t.id===id);
  if(t) { t.done = !t.done; if(t.done) launchConfetti(); }
  saveTasks(tasks); renderTasks();
}

function deleteTask(id) {
  const tasks = loadTasks(), snapshot = JSON.stringify(tasks);
  saveTasks(tasks.filter(t=>t.id!==id));
  pushUndo('タスクを削除', ()=>saveTasks(JSON.parse(snapshot)));
  renderTasks();
}

function filterTasks(tasks) {
  const today=todayStr(), tmrw=tomorrowStr();
  switch(currentFilter) {
    case 'active': return tasks.filter(t=>!t.done);
    case 'done': return tasks.filter(t=>t.done);
    case 'high': return tasks.filter(t=>t.priority==='high'&&!t.done);
    case 'today': return tasks.filter(t=>t.due===today&&!t.done);
    case 'tomorrow': return tasks.filter(t=>t.due===tmrw&&!t.done);
    case 'overdue': return tasks.filter(t=>t.due&&t.due<today&&!t.done);
    default: return tasks;
  }
}

function sortTasks(tasks) {
  const m = document.getElementById('task-sort').value; if(m==='manual')return tasks;
  const c=[...tasks], pv={high:0,medium:1,low:2};
  switch(m) {
    case 'priority': c.sort((a,b)=>(pv[a.priority]||1)-(pv[b.priority]||1)); break;
    case 'due': c.sort((a,b)=>{ if(!a.due&&!b.due)return 0; if(!a.due)return 1; if(!b.due)return -1; return a.due.localeCompare(b.due); }); break;
    case 'created': c.sort((a,b)=>new Date(b.created)-new Date(a.created)); break;
    case 'name': c.sort((a,b)=>a.text.localeCompare(b.text,'ja')); break;
  }
  return c;
}

function getDueClass(d) { if(!d)return''; const t=todayStr(); if(d<t)return'due-overdue'; if(d===t)return'due-today'; if(d===tomorrowStr())return'due-tomorrow'; return'due-future'; }
function getDueLabel(d) { if(!d)return''; const t=todayStr(); if(d<t)return'期限切れ'; if(d===t)return'今日'; if(d===tomorrowStr())return'明日'; const dt=new Date(d+'T00:00:00'); return `${dt.getMonth()+1}/${dt.getDate()}`; }

function renderTasks() {
  const tasks=loadTasks(), filtered=sortTasks(filterTasks(tasks)), list=document.getElementById('task-list'), empty=document.getElementById('task-empty'), today=todayStr();
  document.getElementById('stat-total').textContent=tasks.length;
  document.getElementById('stat-active').textContent=tasks.filter(t=>!t.done).length;
  document.getElementById('stat-done').textContent=tasks.filter(t=>t.done).length;
  document.getElementById('stat-overdue').textContent=tasks.filter(t=>t.due&&t.due<today&&!t.done).length;
  document.getElementById('task-count').textContent=`${filtered.length} items`;

  if(!filtered.length) { list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  list.innerHTML = filtered.map(t => {
    const d=new Date(t.created), ds=`${d.getMonth()+1}/${d.getDate()}`;
    const isOd=t.due&&t.due<today&&!t.done, dc=getDueClass(t.due), dl=getDueLabel(t.due);
    const sd=(t.subtasks||[]).filter(s=>s.done).length, st=(t.subtasks||[]).length, sp=st?Math.round(sd/st*100):0;
    return `<li class="task-item ${t.done?'done':''} ${isOd?'overdue':''}" data-id="${t.id}" draggable="true"
      ondragstart="onDragStart(event)" ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragend="onDragEnd(event)">
      <span class="drag-handle">&#8942;&#8942;</span>
      <button class="task-check" onclick="toggleTask(${t.id})">${t.done?'&#10003;':''}</button>
      <div class="task-body" onclick="openTaskDetail(${t.id})" style="cursor:pointer;">
        <div class="task-title">${escapeHTML(t.text)}</div>
        <div class="task-meta">
          <span class="priority-badge priority-${t.priority}">${{high:'HIGH',medium:'MID',low:'LOW'}[t.priority]}</span>
          <span class="task-date">${ds}</span>
          ${dl?`<span class="task-due ${dc}">${dl}</span>`:''}
          ${(t.tags||[]).length?`<span class="task-tags">${t.tags.map(tag=>`<span class="tag-pill" style="${tagStyle(tag)}">${escapeHTML(tag)}</span>`).join('')}</span>`:''}
        </div>
        ${st?`<div class="subtask-bar"><div class="subtask-progress"><div class="subtask-progress-fill" style="width:${sp}%"></div></div><span class="subtask-count">${sd}/${st}</span></div>`:''}
      </div>
      <div class="task-actions">
        <button class="icon-btn" onclick="openTaskDetail(${t.id})" title="詳細">&#9998;</button>
        <button class="icon-btn delete" onclick="event.stopPropagation();deleteTask(${t.id})" title="削除">&#10005;</button>
      </div>
    </li>`;
  }).join('');
}

  let f=memos;
  if(q)f=f.filter(m=>m.title.toLowerCase().includes(q)||m.body.toLowerCase().includes(q)||(m.tags||[]).some(t=>t.toLowerCase().includes(q)));
  if(memoFilterTags.length)f=f.filter(m=>memoFilterTags.every(ft=>(m.tags||[]).includes(ft)));
  const grid=document.getElementById('memo-grid'), empty=document.getElementById('memo-empty');
  if(!f.length){grid.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  grid.innerHTML=f.map(m=>{const d=new Date(m.updated||m.created),ds=`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;const p=m.body.length>100?m.body.substring(0,100)+'...':m.body;
    return`<div class="memo-card" data-color="${m.color||''}" onclick="openMemoEditor(${m.id})">
      <button class="icon-btn delete delete-memo" onclick="deleteMemo(${m.id},event)">&#10005;</button>
      <div class="memo-card-title">${escapeHTML(m.title)}</div>
      <div class="memo-card-body">${escapeHTML(p)}</div>
      <div class="memo-card-footer"><span class="memo-card-date">${ds}</span><span class="memo-card-tags">${(m.tags||[]).map(t=>`<span class="tag-pill" style="${tagStyle(t)}">${escapeHTML(t)}</span>`).join('')}</span></div>
    </div>`;}).join('');
}

function renderMemoTags(){const w=document.getElementById('memo-tags-wrap'),i=document.getElementById('memo-tag-input');w.querySelectorAll('.tag-pill').forEach(e=>e.remove());editingMemoTags.forEach((tag,idx)=>{const p=document.createElement('span');p.className='tag-pill';p.style.cssText=tagStyle(tag);p.innerHTML=`${escapeHTML(tag)}<span class="tag-remove" onclick="removeMemoTag(${idx})">&#10005;</span>`;w.insertBefore(p,i);});}
document.getElementById('memo-tag-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.isComposing){e.preventDefault();const v=e.target.value.trim();if(v&&!editingMemoTags.includes(v)){editingMemoTags.push(v);renderMemoTags();renderMemoTagSuggestions();}e.target.value='';}});
function removeMemoTag(i){editingMemoTags.splice(i,1);renderMemoTags();renderMemoTagSuggestions();}

document.getElementById('memo-tag-filter-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.isComposing){e.preventDefault();const v=e.target.value.trim();if(v&&!memoFilterTags.includes(v)){memoFilterTags.push(v);renderMemoFilterTags();renderMemos();}e.target.value='';}});
function renderMemoFilterTags(){const w=document.getElementById('memo-tag-filter'),i=document.getElementById('memo-tag-filter-input');w.querySelectorAll('.tag-pill').forEach(e=>e.remove());memoFilterTags.forEach((tag,idx)=>{const p=document.createElement('span');p.className='tag-pill';p.style.cssText=tagStyle(tag);p.innerHTML=`${escapeHTML(tag)}<span class="tag-remove" onclick="removeMemoFilterTag(${idx})">&#10005;</span>`;w.insertBefore(p,i);});}
function removeMemoFilterTag(i){memoFilterTags.splice(i,1);renderMemoFilterTags();renderMemos();}

function updateColorPicker(){document.querySelectorAll('.color-dot').forEach(d=>d.classList.toggle('active',d.dataset.color===selectedColor));}
document.querySelectorAll('.color-dot').forEach(d=>d.addEventListener('click',()=>{selectedColor=d.dataset.color;updateColorPicker();}));

function switchMemoTab(tab) {
  document.querySelectorAll('.memo-tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.memoTab===tab));
  const ta=document.getElementById('memo-body'), pv=document.getElementById('memo-preview');
  if(tab==='edit'){ta.style.display='';pv.style.display='none';}
  else{ta.style.display='none';pv.style.display='';pv.innerHTML=renderMarkdown(ta.value);}
}

// ======================== Markdown ========================
function renderMarkdown(text) {
  if(!text)return'<p style="color:var(--text3)">Nothing to preview</p>';
  let h = escapeHTML(text);
  h=h.replace(/```(\w*)\n([\s\S]*?)```/g,(_,l,c)=>`<pre><code>${c.trim()}</code></pre>`);
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  h=h.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');
  h=h.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');
  h=h.replace(/^---$/gm,'<hr>');
  h=h.replace(/^[\-\*] (.+)$/gm,'<li>$1</li>');
  h=h.replace(/((<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>');
  h=h.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  h=h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');
  h=h.replace(/\n\n/g,'</p><p>');
  h=h.replace(/\n/g,'<br>');
  h='<p>'+h+'</p>';
  h=h.replace(/<p>\s*(<(?:h[1-3]|ul|pre|blockquote|hr)>)/g,'$1');
  h=h.replace(/(<\/(?:h[1-3]|ul|pre|blockquote)>)\s*<\/p>/g,'$1');
  h=h.replace(/<p>\s*(<hr>)\s*<\/p>/g,'$1');
  h=h.replace(/<p>\s*<\/p>/g,'');
  return h;
}

// ======================== Data Management ========================
function openDataModal(){document.getElementById('data-modal').classList.add('open');document.getElementById('data-textarea').value='';}
function closeDataModal(){document.getElementById('data-modal').classList.remove('open');}
function exportData(){document.getElementById('data-textarea').value=JSON.stringify({project:getActiveProject(),tasks:loadTasks(),memos:loadMemos(),exportedAt:new Date().toISOString()},null,2);}
function importData(){try{const d=JSON.parse(document.getElementById('data-textarea').value.trim());if(d.tasks)saveTasks(d.tasks);if(d.memos)saveMemos(d.memos);renderTasks();renderMemos();alert('Done!');}catch(e){alert('Error: '+e.message);}}
function downloadData(){const d={project:getActiveProject(),tasks:loadTasks(),memos:loadMemos(),exportedAt:new Date().toISOString()};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`taskmemo_${todayStr()}.json`;a.click();URL.revokeObjectURL(u);}
function loadFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{document.getElementById('data-textarea').value=ev.target.result;};r.readAsText(f);e.target.value='';}

// ======================== Notifications ========================
function checkReminders() {
  if(!('Notification' in window))return;
  const tasks=loadTasks(), today=todayStr();
  const due=tasks.filter(t=>t.due===today&&!t.done), over=tasks.filter(t=>t.due&&t.due<today&&!t.done);
  if(!due.length&&!over.length)return;
  if(Notification.permission==='granted')sendReminder(due,over);
  else if(Notification.permission!=='denied')Notification.requestPermission().then(p=>{if(p==='granted')sendReminder(due,over);});
}
function sendReminder(td,od) {
  if(localStorage.getItem('taskmemo_last_notif')===todayStr())return;
  let b=''; if(od.length)b+=`期限切れ: ${od.length}件\n`; if(td.length)b+=`今日の期限: ${td.length}件`;
  new Notification('TaskMemo',{body:b.trim()});
  localStorage.setItem('taskmemo_last_notif',todayStr());
}

// ======================== Events ========================
document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(btn.dataset.tab+'-view').classList.add('active');
}));
document.querySelectorAll('.filter-chip').forEach(chip=>chip.addEventListener('click',()=>{
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));chip.classList.add('active');
  currentFilter=chip.dataset.filter; renderTasks();
}));
document.getElementById('task-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.isComposing)addTask();});
document.getElementById('memo-search').addEventListener('input',renderMemos);
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open'));
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){
    if(document.getElementById('memo-modal').classList.contains('open')){e.preventDefault();saveMemo();}
    else if(document.getElementById('task-detail-modal').classList.contains('open')){e.preventDefault();saveTaskDetail();}
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){
    const a=document.activeElement;if(a&&(a.tagName==='INPUT'||a.tagName==='TEXTAREA'))return;
    if(undoStack.length){e.preventDefault();performUndo();}
  }
});

// ======================== Helpers ========================
function escapeHTML(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ======================== Init ========================
(async function init() {
  initTheme();
  const loaded = await loadFromServer();
  renderProjectSelect(); renderTasks(); renderMemos(); checkReminders();
  if (_isLocalServer) {
    const el = document.getElementById('backup-status');
    if (el) { el.textContent = loaded ? '✔ サーバーから復元済' : '✔ 自動保存ON'; el.style.color = 'var(--green)'; }
  } else {
    const el = document.getElementById('backup-status');
    if (el) { el.textContent = 'サーバー未接続（python3 server.py で起動）'; el.style.color = 'var(--orange)'; }
  }
})();
setInterval(checkReminders, 30*60*1000);
</script>
